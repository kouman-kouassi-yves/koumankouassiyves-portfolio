<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Bonjour Monde — React</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      function MyApp() {
        return <h1>Bonjour, monde !</h1>;
      }

      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<MyApp />);
    </script>

    <!--
      NOTE : Cette page est un fichier de test React standalone.
      Elle n'est pas servie par Flask (aucune route dans app.py).
      Pour un vrai projet React, voir : https://react.dev/learn/start-a-new-react-project
    -->
  </body>
</html>
