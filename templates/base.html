
<!DOCTYPE html>
<html lang="fr">

<head>

    <title>{% block title %}Mon Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}

</head>

<body>




<div>



    <div>
        <nav>

                </li>
                <li>

                    </a>

                <li>

                    </a>
                </li>
                <li>
