{% extends "base.html" %}

{% block title %}Page introuvable{% endblock %}

{% block content %}
<section id="not-found" style="text-align: center; padding: 4rem 2rem; max-width: 600px; margin: 0 auto;">
    <p style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; letter-spacing: 0.15em; color: var(--accent2); text-transform: uppercase; margin-bottom: 1rem;">
        Erreur 404
    </p>
    <h2 style="font-size: clamp(2rem, 8vw, 5rem); margin-bottom: 1.5rem;">Page introuvable</h2>
    <p style="color: var(--text2); margin-bottom: 2.5rem;">
        La page que vous recherchez n'existe pas ou a été déplacée.
    </p>
    <a href="{{ url_for('index') }}"
       style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; background: var(--accent); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; transition: opacity 0.2s;">
        ← Retour à l'accueil
    </a>
</section>
{% endblock %}
